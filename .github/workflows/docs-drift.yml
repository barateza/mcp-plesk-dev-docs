name: Documentation Drift Check

permissions:
  contents: read

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  check-drift:
    name: Detect Documentation Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 markdownify

      - name: Run management script
        run: |
          # This will check for updates and download/convert them if available.
          # If it makes changes to knowledge_base/, git status will show them.
          python scripts/manage_plesk_docs.py

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain knowledge_base/)" ]; then
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
            echo "Changes detected in knowledge_base/"
          else
            echo "DRIFT_DETECTED=false" >> $GITHUB_ENV
            echo "No changes detected."
          fi

      - name: Fail if drift detected
        if: env.DRIFT_DETECTED == 'true'
        run: |
          echo "Error: Documentation drift detected. Please run 'python scripts/manage_plesk_docs.py' locally and commit the changes."
          exit 1
