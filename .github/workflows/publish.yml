name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI + MCP Registry
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-plesk-dev-docs
    permissions:
      id-token: write  # Required for Trusted Publishing / OIDC
      contents: write  # Needed to push server.json update back to main
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Checkout repository (for server.json)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update server.json version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating server.json version to $VERSION"
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/g" server.json

      - name: Commit server.json update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add server.json
          git commit -m "chore: bump server.json to ${GITHUB_REF_NAME#v} [skip ci]"
          git push

      # Manual step after CI completes:
      #   mcp-publisher login github
      #   mcp-publisher publish
