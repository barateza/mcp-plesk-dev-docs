[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tq-search"
version = "0.1.0"
description = "High-performance PyTorch Vector Quantization Engine with Lloyd-Max and QJL sign residual correction."
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "torch>=2.4.0",
]

[tool.setuptools]
packages = ["tq_search"]
