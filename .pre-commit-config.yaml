repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-error-summary]
        additional_dependencies: [torch, numpy, types-PyYAML]
        stages: [pre-commit]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        # Scan staged files (fast). Skip B101 globally — asserts in test files
        # are intentional pytest patterns, and production code already has none.
        args: [-r, --skip, B101]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: quality-gate
        name: quality gate
        description: "Run light-profile control benchmark against golden baseline"
        entry: .venv/bin/python3 scripts/benchmark_profiles.py --suite control --profile light --baseline-file benchmarks/baselines/light.json --gate-config benchmarks/gates/default.json --fail-on-gate
        language: system
        pass_filenames: false
        stages: [pre-push]
