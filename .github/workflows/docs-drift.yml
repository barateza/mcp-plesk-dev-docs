name: TOC Enrichment Check

permissions:
  contents: read

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 03:00 UTC
  workflow_dispatch:

jobs:
  toc-enrich:
    name: Enrich TOC Descriptions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run TOC enrichment
        run: |
          python scripts/enrich_html_toc.py

      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain knowledge_base/)" ]; then
            echo "DRIFT_DETECTED=true" >> $GITHUB_ENV
            echo "TOC descriptions updated in knowledge_base/"
          else
            echo "DRIFT_DETECTED=false" >> $GITHUB_ENV
            echo "No TOC updates needed."
          fi

      - name: Fail if enrichment produced changes
        if: env.DRIFT_DETECTED == 'true'
        run: |
          echo "TOC descriptions were updated. Run locally to review and commit:"
          echo "  python scripts/enrich_html_toc.py"
          exit 1
